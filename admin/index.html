<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GUDO Space 後台管理</title>
  <link rel="icon" href="/assets/logo.svg" type="image/svg+xml" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/admin/admin.css?v=3" />
</head>
<body>

  <!-- 後台主體（登入為獨立頁 /admin/login） -->
  <div id="app" class="app" hidden>
    <aside class="side">
      <div class="side__brand"><img src="/assets/logo.svg" width="34" height="34" alt="" /><span>GUDO Space</span></div>
      <nav class="side__nav" id="nav">
        <button data-view="submissions" class="is-active">📥 預約收單</button>
        <button data-view="news">📰 最新消息</button>
        <button data-view="chronicles">📷 活動紀實</button>
        <button data-view="availability">🎫 名額管理</button>
        <button data-view="plans">💳 會員方案</button>
        <button data-view="rentals">🏫 加購與租借</button>
        <button data-view="events">📅 活動管理</button>
        <button data-view="faq">❓ FAQ</button>
        <button data-view="pages">📝 頁面文案</button>
        <button data-view="blocks">🧩 區塊管理</button>
        <button data-view="media">🗂️ 媒體庫</button>
        <button data-view="users">👤 使用者</button>
      </nav>
      <div class="side__foot">
        <a href="/" target="_blank" class="side__view">🔗 查看官網</a>
        <div class="side__me"><span id="me-name"></span><button id="logout">登出</button></div>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <h2 id="view-title">預約收單</h2>
        <div class="topbar__actions" id="view-actions"></div>
      </header>
      <div class="content" id="view"></div>
    </main>
  </div>

  <div class="toast" id="toast" hidden></div>

  <script src="/admin/admin.js?v=3"></script>
</body>
</html>
